<div class="site-footer__inner">
  <p>&copy; {{ site.time | date: '%Y' }} {{ site.name | default: site.title }}</p>
  <p class="site-footer__links">
    <a href="mailto:{{ site.author.email }}">Email</a>
    <span aria-hidden="true">/</span>
    <a href="https://github.com/{{ site.author.github }}">GitHub</a>
    <span aria-hidden="true">/</span>
    <a href="https://www.linkedin.com/in/{{ site.author.linkedin }}/">LinkedIn</a>
    <span aria-hidden="true">/</span>
    <a href="{{ '/sitemap/' | relative_url }}">Sitemap</a>
    {% if site.atom_feed.hide != true %}
      <span aria-hidden="true">/</span>
      <a href="{% if site.atom_feed.path %}{{ site.atom_feed.path | relative_url }}{% else %}{{ '/feed.xml' | relative_url }}{% endif %}">RSS</a>
    {% endif %}
  </p>
</div>
