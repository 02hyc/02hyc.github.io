<header class="site-header">
  <div class="site-header__inner">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.name | default: site.title }}</a>
    <nav class="site-nav" aria-label="Primary navigation">
      {% for link in site.data.navigation.main %}
        <a href="{% if link.url contains 'http' %}{{ link.url }}{% else %}{{ link.url | relative_url }}{% endif %}">{{ link.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
